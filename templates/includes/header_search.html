{# Поиск в шапке: всегда виден на всех страницах, ведёт на каталог с параметром search #}
<div class="header__search">
    <form method="get" action="{% url 'shop:catalog' %}" class="header__search-form" id="header-search-form">
        <div class="header__search-wrapper">
            <input type="text"
                   name="search"
                   class="header__search-input"
                   id="header-search-input"
                   placeholder="Поиск по номеру детали, названию, бренду..."
                   autocomplete="off"
                   aria-label="Поиск по номеру детали, названию, бренду"
                   aria-autocomplete="list"
                   aria-controls="header-search-ac-list">
            <button type="submit" class="header__search-btn" aria-label="Найти">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M21 21L16.514 16.506L21 21ZM19 10.5C19 15.194 15.194 19 10.5 19C5.806 19 2 15.194 2 10.5C2 5.806 5.806 2 10.5 2C15.194 2 19 5.806 19 10.5Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>
        <div class="header__search-ac" id="header-search-ac" role="listbox" aria-hidden="true" style="display: none;">
            <ul class="header__search-ac-list" id="header-search-ac-list"></ul>
        </div>
    </form>
</div>
<style>
.header__search { margin: 15px 0 20px; width: 100%; max-width: 100%; position: relative; }
.header__search-form { margin: 0; }
.header__search-wrapper { display: flex; align-items: center; background: #fff; border: 2px solid #e9ecef; border-radius: 8px; transition: border-color 0.3s ease; }
.header__search-wrapper:focus-within { border-color: #3CC14E; box-shadow: 0 0 0 3px rgba(60, 193, 78, 0.15); }
.header__search-input { flex: 1; padding: 12px 18px; border: none; border-radius: 6px 0 0 6px; font-size: 16px; background: transparent; font-family: inherit; }
.header__search-input:focus { outline: none; }
.header__search-input::placeholder { color: #6c757d; }
.header__search-btn { display: flex; align-items: center; justify-content: center; padding: 12px 18px; background: #3CC14E; color: white; border: none; border-radius: 0 6px 6px 0; cursor: pointer; transition: background 0.3s ease; }
.header__search-btn:hover { background: #309a3e; }
.header__search-btn svg { width: 20px; height: 20px; }
.header__search-ac { position: absolute; top: 100%; left: 0; right: 0; margin-top: 4px; background: #fff; border: 1px solid #e9ecef; border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); z-index: 100; max-height: 280px; overflow-y: auto; }
.header__search-ac-list { list-style: none; margin: 0; padding: 8px 0; }
.header__search-ac-item { padding: 10px 18px; cursor: pointer; font-size: 14px; color: #1a1a1a; border-bottom: 1px solid #f0f0f0; }
.header__search-ac-item:last-child { border-bottom: none; }
.header__search-ac-item:hover, .header__search-ac-item.header__search-ac-item--active { background: #f0f9f0; color: #1a1a1a; }
.header__search-ac-item--brand { color: #666; }
@media (max-width: 768px) {
  .header__search { margin: 14px 0 0; }
  .header__search-wrapper { flex-wrap: wrap; }
  .header__search-input { width: 100%; border-radius: 8px 8px 0 0; padding: 10px 14px; font-size: 15px; }
  .header__search-btn { width: 100%; border-radius: 0 0 8px 8px; padding: 10px; }
}
</style>
<script>
(function() {
    var form = document.getElementById('header-search-form');
    var catalogUrl = form ? form.getAttribute('action') || form.action : '';
    var input = document.getElementById('header-search-input');
    var ac = document.getElementById('header-search-ac');
    var listEl = document.getElementById('header-search-ac-list');
    if (!input || !ac || !listEl || !catalogUrl) return;

    var debounceTimer;
    var currentSuggestions = [];
    var activeIndex = -1;
    var autocompleteBase = catalogUrl.replace(/\/catalog\/?$/, '');

    function getCatalogParams() {
        var params = [];
        try {
            var s = window.location.search.slice(1).split('&');
            for (var i = 0; i < s.length; i++) {
                var p = s[i].split('=');
                if (p[0] === 'brand' || p[0] === 'category') params.push(p[0] + '=' + encodeURIComponent(p[1] || ''));
            }
        } catch (e) {}
        return params.join('&');
    }
    function fetchSuggestions(q, callback) {
        var url = autocompleteBase + '/search-autocomplete/?q=' + encodeURIComponent(q);
        var extra = getCatalogParams();
        if (extra) url += '&' + extra;
        var xhr = new XMLHttpRequest();
        xhr.open('GET', url);
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4) {
                try {
                    var data = xhr.status === 200 ? JSON.parse(xhr.responseText) : {};
                    callback(data.suggestions || []);
                } catch (e) { callback([]); }
            }
        };
        xhr.send();
    }

    function showAc(items) {
        currentSuggestions = items;
        activeIndex = -1;
        listEl.innerHTML = '';
        if (items.length === 0) { ac.style.display = 'none'; ac.setAttribute('aria-hidden', 'true'); return; }
        items.forEach(function(item, i) {
            var li = document.createElement('li');
            li.className = 'header__search-ac-item' + (item.text.indexOf('Бренд:') === 0 ? ' header__search-ac-item--brand' : '');
            li.setAttribute('role', 'option');
            li.setAttribute('data-value', item.value);
            li.textContent = item.text;
            li.addEventListener('click', function() { selectItem(item); });
            listEl.appendChild(li);
        });
        ac.style.display = 'block';
        ac.setAttribute('aria-hidden', 'false');
    }

    function selectItem(item) {
        input.value = item.value;
        ac.style.display = 'none';
        ac.setAttribute('aria-hidden', 'true');
        var sep = catalogUrl.indexOf('?') >= 0 ? '&' : '?';
        var extra = getCatalogParams();
        var target = catalogUrl + sep + 'search=' + encodeURIComponent(item.value);
        if (extra) target += '&' + extra;
        window.location.href = target;
    }

    function onInput() {
        var q = (input.value || '').trim();
        if (q.length < 2) { showAc([]); return; }
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(function() { fetchSuggestions(q, showAc); }, 280);
    }

    input.addEventListener('input', onInput);
    input.addEventListener('focus', function() { if (currentSuggestions.length > 0) { ac.style.display = 'block'; ac.setAttribute('aria-hidden', 'false'); } });
    input.addEventListener('keydown', function(e) {
        if (ac.style.display !== 'block' || currentSuggestions.length === 0) {
            if (e.key === 'Escape') input.blur();
            return;
        }
        if (e.key === 'Escape') { ac.style.display = 'none'; ac.setAttribute('aria-hidden', 'true'); activeIndex = -1; return; }
        if (e.key === 'ArrowDown') { e.preventDefault(); activeIndex = Math.min(activeIndex + 1, currentSuggestions.length - 1); updateActive(); return; }
        if (e.key === 'ArrowUp') { e.preventDefault(); activeIndex = Math.max(activeIndex - 1, -1); updateActive(); return; }
        if (e.key === 'Enter' && activeIndex >= 0 && currentSuggestions[activeIndex]) { e.preventDefault(); selectItem(currentSuggestions[activeIndex]); }
    });

    function updateActive() {
        var items = listEl.querySelectorAll('.header__search-ac-item');
        for (var i = 0; i < items.length; i++) { items[i].classList.toggle('header__search-ac-item--active', i === activeIndex); }
    }

    document.addEventListener('click', function(e) {
        if (ac && !ac.contains(e.target) && e.target !== input) { ac.style.display = 'none'; ac.setAttribute('aria-hidden', 'true'); }
    });
})();
</script>
